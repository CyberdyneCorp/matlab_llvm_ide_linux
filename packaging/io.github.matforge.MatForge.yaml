# Flatpak manifest for MatForge IDE.
#
# Build (needs flatpak-builder + the GNOME SDK/Platform 47 and the rust-stable
# SDK extension):
#
#   flatpak install flathub org.gnome.Sdk//47 org.gnome.Platform//47 \
#       org.freedesktop.Sdk.Extension.rust-stable//24.08
#   flatpak-builder --user --install --force-clean build-dir \
#       packaging/io.github.matforge.MatForge.yaml
#
# Cargo builds offline inside the sandbox, so dependencies must be vendored
# first and listed as extra sources. Generate `cargo-sources.json` with
# flatpak-cargo-generator (https://github.com/flatpak/flatpak-builder-tools):
#
#   python3 flatpak-cargo-generator.py Cargo.lock -o packaging/cargo-sources.json
#
# The matlab_llvm compiler (`matlabc`) is an external native toolchain and is
# NOT bundled; `--filesystem=host` lets the app find it via $MATLABC_PATH or
# ~/.config/matforge/config.toml on the host.

app-id: io.github.matforge.MatForge
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: matforge

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Reach the host-installed matlabc toolchain + open user projects.
  - --filesystem=host
  - --env=PATH=/app/bin:/usr/bin

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/matforge/cargo

modules:
  - name: matforge
    buildsystem: simple
    build-commands:
      - cargo --offline build --release -p matforge
      - install -Dm755 target/release/matforge /app/bin/matforge
      - install -Dm644 crates/app/resources/matforge.desktop
          /app/share/applications/io.github.matforge.MatForge.desktop
      - install -Dm644 crates/app/resources/matforge.svg
          /app/share/icons/hicolor/scalable/apps/io.github.matforge.MatForge.svg
    sources:
      - type: dir
        path: ..
      # Generated by flatpak-cargo-generator (see header); provides the
      # vendored crate sources for the offline cargo build.
      - cargo-sources.json
